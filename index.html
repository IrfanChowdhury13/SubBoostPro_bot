  body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;

  max-width:100%;
  padding:15px;
  display: flex !important;
  flex-direction:column; /* 🔥 MAIN FIX */
  gap:12px;

/* PROFILE */

  display:flex;

  margin-bottom:10px;

  font-size:30px;

<script>
const API = "https://script.google.com/macros/s/AKfycbygcTQPEjhx6n3iLr9OoY3ncWMzmO6jLUYVZKOSYJFGFUirg0TPSSs7jm_iF40gnpRCpA/exec";

// LOGIN
function login(){
  const id = document.getElementById("useridInput").value;

  if(!id){
    alert("Enter your Telegram ID");
    return;
  }

  localStorage.setItem("id", id);
  localStorage.setItem("name", "User-"+id.slice(0,5));

  startApp();
}

// START APP
function startApp() {
  const id = localStorage.getItem("id");
  const name = localStorage.getItem("name");

  if (!id) return;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("userid").innerText=id;
  document.getElementById("username").innerText=name;

  fetch(API + "?action=register&user="+id+"&name="+name);

  loadPoints();
  loadTaskStatus(); // ✅ IMPORTANT
}

// LOAD POINTS
function loadPoints(){
  const id = localStorage.getItem("id");

  fetch(API + "?action=getPoints&user="+id)
  .then(r=>r.text())
  .then(d=>{
    document.getElementById("points").innerText=d;
  });
}

// EARN (optional)
function earn(point){
  const id = localStorage.getItem("id");

  fetch(API + "?action=addPoints&user="+id+"&amount="+point)
  .then(()=>loadPoints());
}

// TAB SWITCH
function showTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

// SUBMIT TASK
function submitTask(taskId){
  const id = localStorage.getItem("id");

  if(localStorage.getItem("task"+taskId)){
    alert("Already Submitted");
    return;
  }

  localStorage.setItem("task"+taskId, "submitted");

  document.getElementById("btn"+taskId).style.display="none";
  document.getElementById("status"+taskId).innerText="Submitted for verification";

  fetch(API + "?action=submitTask&user="+id+"&task="+taskId);
}

// LOAD TASK STATUS
function loadTaskStatus(){
  [1,2].forEach(taskId=>{
    if(localStorage.getItem("task"+taskId)){
      const btn = document.getElementById("btn"+taskId);
      const status = document.getElementById("status"+taskId);

      if(btn) btn.style.display="none";
      if(status) status.innerText="Submitted for verify";
    }
  });
}

  function uploadTask(taskId){
  const id = localStorage.getItem("id");
  const fileInput = document.getElementById("file"+taskId);
  const file = fileInput.files[0];

  if(!file){
    alert("Select screenshot first");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(){
    const base64 = reader.result.split(",")[1];

    fetch(API, {
      method:"POST",
      body: JSON.stringify({
        action:"upload",
        user:id,
        task:taskId,
        file:base64,
        name:file.name
      })
    })
    .then(r=>r.text())
    .then(res=>{
      localStorage.setItem("task"+taskId,"submitted");

      document.getElementById("status"+taskId).innerText="Submitted for verification";
      document.getElementById("file"+taskId).style.display="none";

      alert("Uploaded সফল");
    });
  };

  reader.readAsDataURL(file);
}

// AUTO START
startApp();
</script>
