<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn App</title>
</head>

<body>

<div id="loginBox">

  <a href="https://t.me/SubBoostProIZC_bot" target="_blank">
    <button>📩 Open Telegram Bot</button>
  </a>

  <input type="text" id="useridInput" placeholder="Enter your Telegram ID">

  <button onclick="login()">Login</button>

</div>

  <div id="app" style="display:none">

<!-- PROFILE -->
<div class="profile">
  <div class="avatar">👤</div>
  <div>
    <h3 id="username"></h3>
    <p>ID: <span id="userid"></span></p>
  </div>
</div>

<!-- BALANCE -->
<div class="top">
  <h2>Balance</h2>
  <h1 id="points">0</h1>
</div>

<!-- MENU -->
<div class="menu">
  <button onclick="showTab('tasks')">📋 Tasks</button>
  <button onclick="showTab('services')">💰 Services</button>
</div>

<!-- TASKS -->
<div id="tasks" class="tab active">

  <div class="card">
    <p>📺 Subscribe Channel</p>
    <button onclick="earn(2)">+2 Points</button>
  </div>

  <div class="card">
    <p>👁 Watch Video</p>
    <button onclick="earn(5)">+5 Points</button>
  </div>

</div>

<!-- SERVICES -->
<div id="services" class="tab">

  <div class="card">
    <p>👤 Buy Subscribers</p>
    <button onclick="buy(2)">Cost 2</button>
  </div>

  <div class="card">
    <p>👁 Buy Views</p>
    <button onclick="buy(5)">Cost 5</button>
  </div>

</div>

</div>


<style>
body {
  background:#0b1220;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#app {
  width:100%;
  max-width:400px;
}

.profile {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

.top {
  background:#3b82f6;
  padding:20px;
  margin-top:10px;
  border-radius:10px;
  text-align:center;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  background:#22c55e;
  color:white;
  border-radius:8px;
}

  #loginBox {
  display:flex;
  flex-direction:column;
  gap:10px;
}

#loginBox input {
  padding:10px;
  border:none;
  border-radius:8px;
}

#loginBox button {
  padding:12px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
}

  .menu {
  display:flex;
  margin-top:10px;
}

.menu button {
  flex:1;
  padding:12px;
  border:none;
  background:#1e293b;
  color:white;
  font-weight:bold;
}

.card {
  background:#1e293b;
  padding:15px;
  margin-top:10px;
  border-radius:12px;
}

.tab {
  display:none;
}

.tab.active {
  display:block;
}
</style>

<script>
const API = "https://script.google.com/macros/s/AKfycbygcTQPEjhx6n3iLr9OoY3ncWMzmO6jLUYVZKOSYJFGFUirg0TPSSs7jm_iF40gnpRCpA/exec";

// TELEGRAM LOGIN
function login(){
  const id = document.getElementById("useridInput").value;

  if(!id){
    alert("Enter your Telegram ID");
    return;
  }

  localStorage.setItem("id", id);
  localStorage.setItem("name", "User-"+id.slice(0,5));

  startApp();
}

// LOGIN FUNCTION
function onTelegramAuth(user) {
  alert("Login Success: " + user.first_name); // 👈 test

  localStorage.setItem("id", user.id);
  localStorage.setItem("name", user.first_name);

  startApp();
}

// AUTO LOGIN
function startApp() {
  const id = localStorage.getItem("id");
  const name = localStorage.getItem("name");

  if (!id) return;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("userid").innerText=id;
  document.getElementById("username").innerText=name;

  fetch(API + "?action=register&user="+id+"&name="+name);
  loadPoints();
}

// LOAD POINTS
function loadPoints(){
  const id = localStorage.getItem("id");
  fetch(API + "?action=getPoints&user="+id)
  .then(r=>r.text())
  .then(d=>{
    document.getElementById("points").innerText=d;
  });
}

// EARN
function earn(point){
  const id = localStorage.getItem("id");
  fetch(API + "?action=addPoints&user="+id+"&amount="+point)
  .then(()=>loadPoints());
}

startApp();

  function showTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}
</script>

</body>
</html>
